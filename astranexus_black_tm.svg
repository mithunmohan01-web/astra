<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" width="820" height="220">
  <defs>
    <clipPath id="globeClip"><circle cx="110" cy="110" r="82"/></clipPath>

    <linearGradient id="triRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#FF9933"/>
      <stop offset="50%"  style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#138808"/>
    </linearGradient>

    <filter id="globeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="orbGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- Transparent background -->

  <!-- ==================== -->
  <!--        GLOBE         -->
  <!-- ==================== -->
  <g filter="url(#globeGlow)">
    <circle cx="110" cy="110" r="82" fill="#060810"/>
    <circle cx="110" cy="110" r="82" fill="none" stroke="url(#triRim)" stroke-width="3.5"/>

    <!-- 4 Orbitals -->
    <g clip-path="url(#globeClip)" filter="url(#orbGlow)">
      <ellipse cx="110" cy="110" rx="82" ry="14"
        fill="none" stroke="#FF9933" stroke-width="1.2" opacity="0.75"/>
      <ellipse cx="110" cy="110" rx="82" ry="22"
        fill="none" stroke="#ffffff" stroke-width="1.1" opacity="0.65"
        transform="rotate(45 110 110)"/>
      <ellipse cx="110" cy="110" rx="14" ry="82"
        fill="none" stroke="#138808" stroke-width="1.2" opacity="0.75"/>
      <ellipse cx="110" cy="110" rx="82" ry="22"
        fill="none" stroke="#4a90d9" stroke-width="1.1" opacity="0.65"
        transform="rotate(-45 110 110)"/>
    </g>

    <!-- Satellite dots -->
    <circle cx="192" cy="110" r="4"   fill="#FF9933" filter="url(#dotGlow)"/>
    <circle cx="167" cy="52"  r="3.5" fill="#ffffff"  filter="url(#dotGlow)"/>
    <circle cx="110" cy="28"  r="4"   fill="#138808"  filter="url(#dotGlow)"/>
    <circle cx="167" cy="168" r="3.5" fill="#4a90d9"  filter="url(#dotGlow)"/>
  </g>

  <!-- ==================== -->
  <!--      WORDMARK        -->
  <!-- ==================== -->

  <!-- ASTRANEXUS with ™ -->
  <text
    x="215" y="105"
    font-family="'Arial Black', 'Franklin Gothic Heavy', sans-serif"
    font-size="61"
    font-weight="900"
    letter-spacing="2"
    fill="#FFFFFF">ASTRANEXUS</text>

  <!-- ™ superscript -->
  <text
    x="790" y="68"
    font-family="Arial, sans-serif"
    font-size="19"
    font-weight="400"
    fill="#ffffff"
    opacity="0.75">™</text>

  <!-- Tricolor underline bar -->
  <rect x="215" y="114" width="202" height="2.8" fill="#FF9933"/>
  <rect x="417" y="114" width="202" height="2.8" fill="#FFFFFF" opacity="0.85"/>
  <rect x="619" y="114" width="186" height="2.8" fill="#138808"/>

  <!-- SYSTEMS -->
  <text
    x="219" y="144"
    font-family="Arial, sans-serif"
    font-size="19"
    font-weight="400"
    letter-spacing="14"
    fill="#cccccc">SYSTEMS</text>

  <!-- GLOBAL BUSINESS ESTABLISHMENT -->
  <text
    x="219" y="170"
    font-family="Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="5.5"
    fill="#cccccc">GLOBAL BUSINESS ESTABLISHMENT</text>


</svg>
